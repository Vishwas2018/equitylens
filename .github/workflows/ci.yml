name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commit hygiene (PR only) ──────────────────────────────────────────────
  commit-lint:
    name: Commit lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/restore-deps

      - name: commitlint — conventional format
        run: |
          pnpm commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}"

      # Server-side enforcement of the task-ID suffix pattern.
      # Mirrors the grep in .husky/commit-msg (DEV-0006 mitigation).
      - name: commitlint — task-ID suffix [DNN-TM]
        run: |
          FAILED=0
          while IFS= read -r line; do
            sha="${line%% *}"
            subject="${line#* }"
            if ! printf '%s' "$subject" | grep -qE '\[D[0-9]{2}-T[0-9]+\]$'; then
              echo "❌  $sha  missing task-ID suffix: $subject"
              FAILED=1
            fi
          done < <(git log --format="%H %s" \
                     "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}")
          exit $FAILED

  # ── Code quality ─────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/restore-deps
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/restore-deps
      - run: pnpm lint

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/restore-deps
      - run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/restore-deps
      - run: pnpm test

  # ── Security ─────────────────────────────────────────────────────────────
  # DEF-0001: audit-deps will fail until Next.js 14→15 migration (BL-0022).
  # Kept as a hard failure so the branch protection requirement drives DEF-0001
  # resolution. See docs/process/registers/defect-log.md § DEF-0001.
  audit-deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/restore-deps
      - run: pnpm audit --audit-level=high

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, format-check, test]
    env:
      BUILD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/restore-deps
      - run: pnpm build
